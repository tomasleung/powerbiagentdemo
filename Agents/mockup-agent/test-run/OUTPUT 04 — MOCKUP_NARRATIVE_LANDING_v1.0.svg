<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .surface { fill: #ffffff; stroke: #d9dee6; }
      .panel { fill: #f9fbfd; stroke: #d9dee6; }
      .title { font: 30px Inter, Arial, sans-serif; fill: #14213d; font-weight: 700; }
      .subtitle { font: 16px Inter, Arial, sans-serif; fill: #4a5568; }
      .section { font: 18px Inter, Arial, sans-serif; fill: #14213d; font-weight: 700; }
      .small { font: 13px Inter, Arial, sans-serif; fill: #475569; }
      .label { font: 12px Inter, Arial, sans-serif; fill: #6b7280; }
      .value { font: 24px Inter, Arial, sans-serif; fill: #0b3d91; font-weight: 700; }
      .highlight { fill: #0078d4; }
      .accent { fill: #2a9d8f; }
      .alert { fill: #d13438; }
      .axis { stroke: #cbd5e1; stroke-width: 1; }
      .bar-bg { fill: #e2e8f0; }
      .bar-fill { fill: #0b3d91; }
      .bar-secondary { fill: #2a9d8f; }
      .doc-note { font: 11px Inter, Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900" />

  <!-- Header -->
  <rect class="surface" x="40" y="30" width="1520" height="100" rx="16" />
  <text x="70" y="70" class="title">Live Capacity Intake Readiness</text>
  <text x="70" y="100" class="subtitle">Most centres are close to capacity; urgent closures and data trust gaps are limiting safe intake decisions.</text>

  <!-- Main layout -->
  <rect class="surface" x="40" y="150" width="880" height="520" rx="20" />
  <text x="70" y="190" class="section">Anchor Story: Centre Readiness vs Utilization</text>
  <text x="70" y="215" class="small">Primary decision: which centres can safely receive additional animals?</text>

  <!-- Anchor chart axes -->
  <line x1="120" y1="260" x2="780" y2="260" class="axis" />
  <line x1="120" y1="260" x2="120" y2="580" class="axis" />
  <text x="120" y="245" class="label">100%</text>
  <text x="120" y="300" class="label">80%</text>
  <text x="120" y="360" class="label">60%</text>
  <text x="120" y="420" class="label">40%</text>
  <text x="120" y="480" class="label">20%</text>
  <text x="120" y="540" class="label">0%</text>

  <!-- Bars -->
  <g transform="translate(150,260)">
    <rect x="0" y="0" width="520" height="280" fill="none" />
    <rect x="0" y="10" width="80" height="220" class="bar-bg" rx="10" />
    <rect x="0" y="70" width="80" height="160" class="bar-fill" rx="10" />
    <text x="40" y="310" class="label" text-anchor="middle">Centre 1</text>
    <text x="40" y="285" class="small" text-anchor="middle">74% Util</text>

    <rect x="120" y="10" width="80" height="220" class="bar-bg" rx="10" />
    <rect x="120" y="40" width="80" height="190" class="bar-secondary" rx="10" />
    <text x="160" y="310" class="label" text-anchor="middle">Centre 2</text>
    <text x="160" y="285" class="small" text-anchor="middle">66% Util</text>

    <rect x="240" y="10" width="80" height="220" class="bar-bg" rx="10" />
    <rect x="240" y="0" width="80" height="230" fill="#d13438" rx="10" />
    <text x="280" y="310" class="label" text-anchor="middle">Centre A</text>
    <text x="280" y="285" class="small" text-anchor="middle">102% Util</text>

    <rect x="360" y="10" width="80" height="220" class="bar-bg" rx="10" />
    <rect x="360" y="35" width="80" height="195" fill="#f59e0b" rx="10" />
    <text x="400" y="310" class="label" text-anchor="middle">Centre B</text>
    <text x="400" y="285" class="small" text-anchor="middle">95% Util</text>

    <rect x="480" y="10" width="80" height="220" class="bar-bg" rx="10" />
    <rect x="480" y="95" width="80" height="135" class="bar-secondary" rx="10" />
    <text x="520" y="310" class="label" text-anchor="middle">Centre 3</text>
    <text x="520" y="285" class="small" text-anchor="middle">49% Util</text>
  </g>

  <!-- Chart legend -->
  <rect x="520" y="330" width="14" height="14" fill="#0b3d91" />
  <text x="540" y="342" class="label">Candidate intake</text>
  <rect x="520" y="355" width="14" height="14" fill="#2a9d8f" />
  <text x="540" y="367" class="label">Monitor</text>
  <rect x="520" y="380" width="14" height="14" fill="#f59e0b" />
  <text x="540" y="392" class="label">Warning</text>
  <rect x="520" y="405" width="14" height="14" fill="#d13438" />
  <text x="540" y="417" class="label">Do Not Intake</text>

  <!-- Narrative panel -->
  <rect class="panel" x="940" y="150" width="560" height="520" rx="20" />
  <text x="970" y="190" class="section">Why this matters</text>
  <text x="970" y="225" class="small">The semantic model defines Remaining Capacity and Utilization as the primary intake criteria. This narrative page uses the same measures to surface safe placement decisions.</text>

  <rect x="960" y="255" width="520" height="120" rx="16" fill="#ffffff" stroke="#cbd5e1" />
  <text x="980" y="285" class="small">Key finding</text>
  <text x="980" y="310" class="value">3 centres are intake-ready</text>
  <text x="980" y="335" class="small">Only 2 centres exceed safe utilization or emergency closure limits.</text>

  <rect x="960" y="395" width="520" height="120" rx="16" fill="#ffffff" stroke="#cbd5e1" />
  <text x="980" y="425" class="small">Urgent risk</text>
  <text x="980" y="450" class="value" fill="#d13438">Centre A is over capacity</text>
  <text x="980" y="475" class="small">Remove from intake and investigate data trust before routing animals.</text>

  <rect x="960" y="535" width="520" height="120" rx="16" fill="#ffffff" stroke="#cbd5e1" />
  <text x="980" y="565" class="small">Data trust</text>
  <text x="980" y="590" class="value" fill="#0b3d91">Missing assignments</text>
  <text x="980" y="615" class="small">5 centres have stale confirmation status; treat these as lower confidence.</text>

  <!-- Supporting row -->
  <rect class="surface" x="40" y="690" width="510" height="180" rx="20" />
  <text x="70" y="730" class="section">Data Trust</text>
  <text x="70" y="760" class="small">Missing Kennel Assignments • Capacity Confirmation Status • Last Capacity Update</text>
  <text x="70" y="790" class="value">5 alerts</text>

  <rect class="surface" x="565" y="690" width="510" height="180" rx="20" />
  <text x="595" y="730" class="section">Regional Health</text>
  <text x="595" y="760" class="small">Regional DOG and CAT utilization are used to identify pressure zones.</text>
  <text x="595" y="790" class="value">Lower Mainland: 82%</text>

  <rect class="surface" x="1090" y="690" width="510" height="180" rx="20" />
  <text x="1120" y="730" class="section">Operational Briefing</text>
  <text x="1120" y="760" class="small">Recommend routing intake to candidate centres and pause placements for over-capacity sites.</text>
  <text x="1120" y="790" class="value">Send 4 animals to Centre 1</text>

  <text x="70" y="870" class="doc-note">Narrative-style layout uses one anchor story chart, a side annotation panel, and supporting panels for trust, region, and action.</text>
</svg>
