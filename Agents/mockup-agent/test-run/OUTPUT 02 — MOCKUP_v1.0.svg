<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">

  <!-- Background -->
  <rect width="1600" height="900" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="30" font-family="Arial" font-size="24" font-weight="bold" fill="#333333">
    Animal Flow - Live Capacity Reporting
  </text>

  <!-- Filter Bar -->
  <rect x="40" y="50" width="1520" height="60" fill="#F5F5F5" stroke="#D9D9D9"/>
  <text x="60" y="80" font-family="Arial" font-size="16" font-weight="bold">GLOBAL FILTER BAR</text>

  <rect x="300" y="65" width="180" height="30" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="315" y="85" font-size="12">Animal Type ▼</text>

  <rect x="500" y="65" width="180" height="30" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="515" y="85" font-size="12">Region ▼</text>

  <rect x="700" y="65" width="180" height="30" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="715" y="85" font-size="12">Centre ▼</text>

  <rect x="900" y="65" width="220" height="30" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="915" y="85" font-size="12">Capacity Status ▼</text>

  <!-- Section 1 -->
  <rect x="40" y="130" width="1520" height="100" fill="#F5F5F5" stroke="#D9D9D9"/>
  <text x="60" y="155" font-size="18" font-weight="bold">PROVINCIAL CAPACITY SNAPSHOT</text>

  <rect x="60" y="170" width="260" height="40" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="145" y="195" font-size="12">DOG TOTAL</text>

  <rect x="350" y="170" width="260" height="40" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="440" y="195" font-size="12">DOG OPEN</text>

  <rect x="640" y="170" width="260" height="40" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="730" y="195" font-size="12">DOG UTIL %</text>

  <rect x="930" y="170" width="260" height="40" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="1020" y="195" font-size="12">CAT OPEN</text>

  <rect x="1220" y="170" width="260" height="40" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="1310" y="195" font-size="12">CAT UTIL %</text>

  <!-- Section 2 -->
  <rect x="40" y="250" width="1520" height="90" fill="#F5F5F5" stroke="#D9D9D9"/>
  <text x="60" y="275" font-size="18" font-weight="bold">ACTION REQUIRED</text>

  <rect x="60" y="290" width="460" height="35" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="220" y="312" font-size="12">EMERGENCY CLOSURES</text>

  <rect x="570" y="290" width="460" height="35" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="760" y="312" font-size="12">FULL CENTRES</text>

  <rect x="1080" y="290" width="460" height="35" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="1260" y="312" font-size="12">DATA QUALITY ALERTS</text>

  <!-- Section 3 -->
  <rect x="40" y="360" width="1520" height="110" fill="#F5F5F5" stroke="#D9D9D9"/>
  <text x="60" y="385" font-size="18" font-weight="bold">INTAKE READINESS</text>

  <rect x="60" y="400" width="700" height="50" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="320" y="430" font-size="12">CANDIDATE CENTRES</text>

  <rect x="800" y="400" width="700" height="50" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="1090" y="430" font-size="12">MONITOR CENTRES</text>

  <!-- Section 4 -->
  <rect x="40" y="490" width="1520" height="110" fill="#F5F5F5" stroke="#D9D9D9"/>
  <text x="60" y="515" font-size="18" font-weight="bold">PLACEMENT DECISION BOARD</text>

  <rect x="60" y="530" width="1440" height="50" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="690" y="560" font-size="12">PRIORITY TABLE</text>

  <!-- Section 5 -->
  <rect x="40" y="620" width="1520" height="90" fill="#F5F5F5" stroke="#D9D9D9"/>
  <text x="60" y="645" font-size="18" font-weight="bold">CAPACITY ANALYSIS</text>

  <rect x="60" y="660" width="690" height="35" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="300" y="682" font-size="12">DOG CAPACITY COMPARISON</text>

  <rect x="810" y="660" width="690" height="35" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="1050" y="682" font-size="12">CAT CAPACITY COMPARISON</text>

  <!-- Section 6 -->
  <rect x="40" y="730" width="740" height="130" fill="#F5F5F5" stroke="#D9D9D9"/>
  <text x="60" y="755" font-size="18" font-weight="bold">DATA TRUST</text>

  <rect x="60" y="770" width="320" height="30" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="150" y="790" font-size="12">MISSING ASSIGNMENTS</text>

  <rect x="420" y="770" width="320" height="30" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="520" y="790" font-size="12">CONFIRMATION STATUS</text>

  <rect x="60" y="815" width="320" height="30" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="165" y="835" font-size="12">DATA FRESHNESS</text>

  <rect x="420" y="815" width="320" height="30" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="545" y="835" font-size="12">SYNC STATUS</text>

  <!-- Section 7 -->
  <rect x="820" y="730" width="740" height="130" fill="#F5F5F5" stroke="#D9D9D9"/>
  <text x="840" y="755" font-size="18" font-weight="bold">REGIONAL HEALTH</text>

  <rect x="840" y="770" width="680" height="30" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="1110" y="790" font-size="12">REGIONAL RANKING</text>

  <rect x="840" y="815" width="680" height="30" fill="#FFFFFF" stroke="#D9D9D9"/>
  <text x="1120" y="835" font-size="12">REGIONAL SUMMARY</text>

  <!-- Operational Briefing Overlay -->
  <rect x="1180" y="250" width="340" height="210" fill="#FFFFFF" stroke="#333333" stroke-dasharray="4 4"/>
  <text x="1250" y="275" font-size="16" font-weight="bold">OPERATIONAL BRIEFING</text>

  <rect x="1200" y="290" width="300" height="40" fill="#F5F5F5" stroke="#D9D9D9"/>
  <text x="1285" y="315" font-size="12">RECOMMENDATION #1</text>

  <rect x="1200" y="345" width="300" height="40" fill="#F5F5F5" stroke="#D9D9D9"/>
  <text x="1285" y="370" font-size="12">RECOMMENDATION #2</text>

  <rect x="1200" y="400" width="300" height="40" fill="#F5F5F5" stroke="#D9D9D9"/>
  <text x="1285" y="425" font-size="12">RECOMMENDATION #3</text>

</svg>