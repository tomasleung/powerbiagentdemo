<svg width="1600" height="1400" viewBox="0 0 1600 1400"
xmlns="http://www.w3.org/2000/svg">

<style>

.bg { fill:#F8FAFC; }

.title{
font-family:'Segoe UI';
font-size:28px;
font-weight:700;
fill:#0F172A;
}

.subtitle{
font-family:'Segoe UI';
font-size:12px;
fill:#64748B;
}

.section{
font-family:'Segoe UI';
font-size:18px;
font-weight:700;
fill:#111827;
}

.card{
fill:white;
stroke:#E2E8F0;
stroke-width:1;
rx:12;
}

.kpi-title{
font-family:'Segoe UI';
font-size:12px;
font-weight:600;
fill:#64748B;
}

.kpi-value{
font-family:'Segoe UI';
font-size:30px;
font-weight:700;
fill:#111827;
}

.label{
font-family:'Segoe UI';
font-size:13px;
fill:#475569;
}

.green{fill:#16A34A;}
.yellow{fill:#F59E0B;}
.red{fill:#DC2626;}
.blue{fill:#2563EB;}

</style>

<rect width="1600" height="1400" class="bg"/>

<!-- HEADER -->

<text x="40" y="45" class="title">
Animal Flow — Capacity Intelligence
</text>

<text x="40" y="72" class="subtitle">
Provincial Intake Readiness • Capacity Monitoring • Operational Decision Support
</text>

<!-- OPERATIONAL SNAPSHOT -->

<text x="40" y="120" class="section">
Operational Snapshot
</text>

<rect x="40" y="140" width="220" height="100" class="card"/>
<text x="60" y="175" class="kpi-title">Total Centres</text>
<text x="135" y="220" class="kpi-value">32</text>

<rect x="280" y="140" width="220" height="100" class="card"/>
<text x="300" y="175" class="kpi-title">Animals In Care</text>
<text x="350" y="220" class="kpi-value">1,875</text>

<rect x="520" y="140" width="220" height="100" class="card"/>
<text x="540" y="175" class="kpi-title">Care Capacity</text>
<text x="600" y="220" class="kpi-value">2,140</text>

<rect x="760" y="140" width="220" height="100" class="card"/>
<text x="780" y="175" class="kpi-title">Open Spaces</text>
<text x="850" y="220" class="kpi-value">390</text>

<rect x="1000" y="140" width="220" height="100" class="card"/>
<text x="1020" y="175" class="kpi-title">CAT Spaces</text>
<text x="1090" y="220" class="kpi-value">810</text>

<rect x="1240" y="140" width="220" height="100" class="card"/>
<text x="1260" y="175" class="kpi-title">DOG Spaces</text>
<text x="1330" y="220" class="kpi-value">430</text>

<!-- ACTION REQUIRED -->

<text x="40" y="300" class="section">
Action Required
</text>

<rect x="40" y="320" width="330" height="120" class="card"/>
<text x="60" y="360" class="kpi-title">Centres At Capacity</text>
<text x="180" y="405" class="kpi-value red">4</text>

<rect x="390" y="320" width="330" height="120" class="card"/>
<text x="410" y="360" class="kpi-title">Data Quality Issues</text>
<text x="530" y="405" class="kpi-value yellow">18</text>

<rect x="740" y="320" width="330" height="120" class="card"/>
<text x="760" y="360" class="kpi-title">Pending Confirmation</text>
<text x="890" y="405" class="kpi-value yellow">3</text>

<rect x="1090" y="320" width="330" height="120" class="card"/>
<text x="1110" y="360" class="kpi-title">Emergency Closures</text>
<text x="1240" y="405" class="kpi-value red">2</text>

<!-- INTAKE READINESS -->

<text x="40" y="500" class="section">
Intake Readiness
</text>

<rect x="40" y="520" width="1380" height="100" class="card"/>

<text x="120" y="565" class="kpi-title">Available Centres</text>
<text x="150" y="605" class="kpi-value green">18</text>

<text x="470" y="565" class="kpi-title">Monitor Centres</text>
<text x="500" y="605" class="kpi-value yellow">7</text>

<text x="800" y="565" class="kpi-title">Full Centres</text>
<text x="820" y="605" class="kpi-value red">4</text>

<text x="1120" y="565" class="kpi-title">Closed Centres</text>
<text x="1150" y="605" class="kpi-value red">2</text>

<!-- PLACEMENT DECISION BOARD -->

<text x="40" y="680" class="section">
Placement Decision Board
</text>

<rect x="40" y="700" width="1380" height="250" class="card"/>

<text x="70" y="745" class="label">Kelowna • 15 / 25 Animals • Remaining Capacity 10 • ✅ Intake Candidate</text>
<text x="70" y="795" class="label">Nanaimo • 20 / 25 Animals • Remaining Capacity 5 • 🟡 Monitor</text>
<text x="70" y="845" class="label">Victoria • 25 / 25 Animals • Remaining Capacity 0 • 🔴 Do Not Intake</text>
<text x="70" y="895" class="label">Williams Lake • 25 / 25 Animals • Remaining Capacity 0 • ⚠ Review Data Quality</text>

<!-- CAPACITY + DATA TRUST -->

<text x="40" y="1010" class="section">
Capacity vs Occupancy
</text>

<rect x="40" y="1030" width="680" height="220" class="card"/>

<text x="70" y="1070" class="kpi-title">Care Capacity Health</text>

<text x="70" y="1115" class="label">Animals In Care</text>
<text x="500" y="1115" class="kpi-value">1,875</text>

<text x="70" y="1160" class="label">Care Capacity</text>
<text x="500" y="1160" class="kpi-value">2,140</text>

<text x="70" y="1205" class="label">Remaining Capacity</text>
<text x="500" y="1205" class="kpi-value green">265</text>

<rect x="760" y="1030" width="660" height="220" class="card"/>

<text x="790" y="1070" class="kpi-title">Data Trust</text>

<text x="790" y="1115" class="label">Missing Assignments</text>
<text x="1250" y="1115" class="kpi-value yellow">18</text>

<text x="790" y="1160" class="label">Assignment Accuracy</text>
<text x="1220" y="1160" class="kpi-value green">96%</text>

<text x="790" y="1205" class="label">Stale Updates</text>
<text x="1260" y="1205" class="kpi-value red">2</text>

<!-- AI BRIEFING -->

<text x="40" y="1310" class="section">
AI Operational Briefing
</text>

<rect x="40" y="1325" width="1380" height="60" class="card"/>

<text x="60" y="1360" class="label">
Victoria has reached care capacity. Williams Lake requires data review. Kelowna is the strongest candidate for overflow intake.
</text>

</svg>