<svg width="1800" height="2350" viewBox="0 0 1800 2350"
xmlns="http://www.w3.org/2000/svg">

<style>

.background { fill:#F8FAFC; }

.header {
  fill:#0F172A;
  font-family:'Segoe UI';
  font-size:30px;
  font-weight:700;
}

.subheader {
  fill:#64748B;
  font-family:'Segoe UI';
  font-size:14px;
}

.section {
  fill:#111827;
  font-family:'Segoe UI';
  font-size:18px;
  font-weight:700;
}

.card {
  fill:white;
  stroke:#E2E8F0;
  stroke-width:1;
  rx:12;
}

.cardTitle {
  fill:#64748B;
  font-family:'Segoe UI';
  font-size:12px;
  font-weight:600;
}

.cardValue {
  fill:#111827;
  font-family:'Segoe UI';
  font-size:30px;
  font-weight:700;
}

.label {
  fill:#475569;
  font-family:'Segoe UI';
  font-size:13px;
}

.good { fill:#16A34A; }
.warn { fill:#F59E0B; }
.bad { fill:#DC2626; }
.info { fill:#2563EB; }

</style>

<rect width="1800" height="2350" class="background"/>

